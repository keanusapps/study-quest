<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#4C1D95"/>
      <stop offset="100%" style="stop-color:#1e1060"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <linearGradient id="rocketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0ff"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7C3AED" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Glow overlay -->
  <ellipse cx="180" cy="160" rx="200" ry="180" fill="url(#glow)" opacity="0.6"/>

  <!-- Star particles -->
  <circle cx="80" cy="80" r="5" fill="#FFD700" opacity="0.8"/>
  <circle cx="430" cy="100" r="4" fill="#38BDF8" opacity="0.7"/>
  <circle cx="460" cy="400" r="6" fill="#FFD700" opacity="0.6"/>
  <circle cx="60" cy="420" r="4" fill="#10B981" opacity="0.7"/>
  <circle cx="400" cy="50" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="120" cy="460" r="3" fill="#38BDF8" opacity="0.5"/>
  <circle cx="380" cy="460" r="5" fill="#F472B6" opacity="0.6"/>

  <!-- Orbit ring -->
  <ellipse cx="256" cy="240" rx="140" ry="50" fill="none" stroke="rgba(56,189,248,0.25)" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- Rocket body -->
  <g transform="translate(256,230) rotate(-30)" filter="url(#shadow)">
    <!-- Main body -->
    <ellipse cx="0" cy="0" rx="38" ry="90" fill="url(#rocketGrad)"/>
    <!-- Nose cone -->
    <ellipse cx="0" cy="-90" rx="38" ry="45" fill="#c8d0ff"/>
    <!-- Window -->
    <circle cx="0" cy="-15" r="22" fill="#06061a" opacity="0.9"/>
    <circle cx="0" cy="-15" r="16" fill="#38BDF8" opacity="0.7"/>
    <circle cx="-5" cy="-20" r="6" fill="rgba(255,255,255,0.5)"/>
    <!-- Fins left -->
    <polygon points="-38,50 -70,90 -38,70" fill="#7C3AED"/>
    <!-- Fins right -->
    <polygon points="38,50 70,90 38,70" fill="#7C3AED"/>
    <!-- Engine glow -->
    <ellipse cx="0" cy="95" rx="20" ry="12" fill="#F59E0B" opacity="0.9"/>
    <ellipse cx="0" cy="108" rx="14" ry="22" fill="#EF4444" opacity="0.7"/>
    <ellipse cx="0" cy="122" rx="8" ry="18" fill="#FFF" opacity="0.5"/>
  </g>

  <!-- Stars around rocket -->
  <polygon points="110,180 117,200 138,200 122,212 128,233 110,220 92,233 98,212 82,200 103,200" fill="url(#starGrad)" opacity="0.9" transform="scale(0.7) translate(20,60)"/>
  <polygon points="390,320 395,335 411,335 399,343 403,358 390,349 377,358 381,343 369,335 385,335" fill="url(#starGrad)" opacity="0.8" transform="scale(0.6) translate(270,200)"/>

  <!-- "SQ" text at bottom -->
  <rect x="146" y="400" width="220" height="64" rx="16" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <text x="256" y="445" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="36" font-weight="900" letter-spacing="6" fill="white" opacity="0.95">QUEST</text>
</svg>
